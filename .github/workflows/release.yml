name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "zip=EasyWishlist-${TAG}.zip" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          CHANGELOG=$(git log $RANGE --pretty=format:"- %s" --no-merges)
          {
            echo "body<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Package addon
        run: |
          zip -r "${{ steps.version.outputs.zip }}" EasyWishlist/ \
            -x "*.DS_Store" \
            -x "*__MACOSX*" \
            -x "*.git*" \
            -x "*.luacheckrc" \
            -x "*.editorconfig"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## Changelog
            ${{ steps.changelog.outputs.body }}
          files: ${{ steps.version.outputs.zip }}
