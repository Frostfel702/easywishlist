name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from .toc
        id: version
        run: |
          VERSION=$(grep "^## Version:" EasyWishlist/EasyWishlist.toc | sed 's/## Version: //')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "zip=EasyWishlist-v${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Read changelog
        id: changelog
        run: |
          {
            echo "body<<EOF"
            cat CHANGELOG.md
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Package addon
        run: |
          zip -r "${{ steps.version.outputs.zip }}" EasyWishlist/ \
            -x "*.DS_Store" \
            -x "*__MACOSX*" \
            -x "*.git*" \
            -x "*.luacheckrc" \
            -x "*.editorconfig"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.version.outputs.zip }}
          overwrite: true
